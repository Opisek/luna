name: luna
services:
  luna-frontend:
    container_name: luna-frontend
    ports:
      - "8080:8080"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      PORT: 8080
      PUBLIC_URL: https://cal.example.com
      API_URL: http://luna-backend:3000
    build:
      context: frontend
      dockerfile: Dockerfile

  luna-backend:
    container_name: luna-backend
    volumes:
      - /srv/luna/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUBLIC_URL: https://cal.example.com
      DB_HOST: luna-postgres
      DB_PORT: 5432
      DB_USERNAME: luna
      DB_PASSWORD: luna
      DB_DATABASE: luna
    depends_on:
      - luna-postgres
    build:
      context: backend
      dockerfile: Dockerfile

  luna-postgres:
    image: postgres:16-alpine
    container_name: luna-postgres
    volumes:
      - /srv/luna/postgres:/var/lib/postgresql/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna
      POSTGRES_DB: luna

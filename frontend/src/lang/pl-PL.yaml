      info: "To ustawienia zezwala na określanie przybliżonej lokalizacj sesji użytkowników w ich ustawieniach. Dzięki temu, użytkownicy mogą łatwiej stwierdzić niedozwolony dostęp do ich konta. Z tego powodu, że określenie lokalizacji IP wymaga użytku dostawcy zewnętrznego, proces ten wzbudza obawy względem ochrony danych. Jeżeli wolisz nie używać tej funkcji, możesz ją tu wyłączyć. Proszę wziąć pod uwagę, że same adresy IP nadal będą zapisywana w bazie danych ze względów bezpieczeństwa, nie są lecz udostępniane żadnym dostawcom zewnętrznym poza tym ustawieniem."
    pfp:
      gravatar:
        display: "Zezwalaj na zdjęcia profilowe Gravatar"
        info: "Gravatar to zewnętrzny serwis, który pozwala użytkowniką powiązać zdjęcie profilowe z ich adresem E-Mail. Jest to zrealizowanie poprzez wysłanie wartości hashu MD5 adresu E-Mail użytkownika do serverów Gravatar. Można to uznać za problematyczne dla ochrony danych, ponieważ Gravatar może śledzenie użytkowników poprzez różne serwisy. Jeśli wolisz nie używać zdjęć profilowych Gravatar, możesz je tu wyłączyć. To ustawienia dotyczy wszystkich użytkowników."
      cache:
        display: "Buforój zdjęcia profilowe"
        info: "Czy zdjęcia profilowe z innych stron internetowych (również Gravatar) mają być buforowane lokalnie. Buforowanie zdjęć profilowych polepsza wydajność i prywatność, ale wprowadza również ryzyko hostowania nielegalnych treści, w przypadku kiedy złowrogi użytkownik ustawi takowe zdjęcie profilowe. To samo ryzoko istnieje również wtedy, gdy użytkownicy mogą wgrywać własne zdjęcia profilowe."
      upload:
        display: "Pozwalaj na wgrywanie własnych zdjęć profilowych"
        info: "Pozwala użytkownikom wgrywać własne zdjęcia profilowe bezpośrednio na serwer. Wprowadza to ryzyko hostowania nielegalnych treści, w przypadku kiedy złowrogi użytkowni takoge wgra jako swoje zdjęcie profilowe. To samo ryzyko instije również wtedy, gdy atkywne jest buferowanie zdjęć profilowych."
    verbosity:
      display: "Szczegółowość komunikatów błedów"
      info: "Jak szczegółowe powinny być komunikaty błędów pokazywane użytkownikom.\nTo ustawienia tyczy się wszystkich użytkowników.\nPoziom \"Debug\" nie powinien nigdy być używany w produkcji."
      lvl:
        broad: "Znikoma"
        plain: "Zwykła"
        wordy: "Dokładna"
        debug: "Debug"

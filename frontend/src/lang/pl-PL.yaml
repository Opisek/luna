      tooltip: "Podczas pobieriania wydarzeń z tego kalendarza wystąpił błąd."
  events:
    count:
      all: |
        .input {$count :integer}
        .match $count
          0 {{Brak wydarzeń}}
          one {{{$count} wydarzenie}}
          few {{{$count} wydarzenia}}
          many {{{$count} wydarzeń}}
          * {{{$count} wydarzenia}}
      more: |
        .input {$count :integer}
        .match $count
          * {{i {$count} więcej}}


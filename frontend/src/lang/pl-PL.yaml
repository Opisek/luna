    label: "ID zaproszenia"
    inline: "ID: {$id}"
  date:
    creation:
      display: "Data utworzenia"
      inline: "Utworzono {$date :date length=short} o {$date :time precision=minute} by {$name}"
    expiry:
      display: "Data wygasnięcia"
      today: |
        .input {$date}
        .input {$hours :integer}
        .input {$minutes :integer}

        .match $hours $minutes
          0 one {{Wygasa o {$date :time precision=minute} (jeszcze {$minutes} minuta)}}
          0 few {{Wygasa o {$date :time precision=minute} (jeszcze {$minutes} minuty)}}
          0 many {{Wygasa o {$date :time precision=minute} (jeszcze {$minutes} minut)}}
          0 * {{Wygasa o {$date :time precision=minute} (jeszcze {$minutes} minuty)}}
          one * {{Wygasa o {$date :time precision=minute} (jeszcze {$hours} godzina)}}
          few * {{Wygasa o {$date :time precision=minute} (jeszcze {$hours} godziny)}}
          many * {{Wygasa o {$date :time precision=minute} (jeszcze {$hours} godzin)}}
          * * {{Wygasa o {$date :time precision=minute} (jeszcze {$hours} godziny)}}
      elsewhen: "Wygasa {$date :date length=short} o {$date :time precision=minute}"

    delete: "Could not delete calendar {$name}: {$msg}"
    move: "Could not move calendar {$name}: {$msg}"
    reset: "Could not reset calendar {$name}: {$msg}"
    events:
      tooltip: "An error occurred trying to retrieve events from this calendar."
  events:
    count:
      all: |
        .input {$count :integer}
        .match $count
          0 {{No events}}
          one {{{$count} event}}
          * {{{$count} events}}
      more: |
        .input {$count :integer}
        .match $count
          * {{and {$count} more}}


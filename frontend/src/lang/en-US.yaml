    creation:
      display: "Creation Date"
      inline: "Created on {$date :date length=short} at {$date :time precision=minute} by {$name}"
    expiry:
      display: "Expiry Date"
      today: |
        .input {$hours :integer}
        .input {$minutes :integer}
      
        .match $hours $minutes
          0 1 {{{$minutes} minute left}}
          0 * {{{$minutes} minutes left}}
          1 * {{{$hours} hour left}}
          * * {{{$hours} hours left}}
      elsewhen: "Expires on {$date :date length=short} at {$date :time precision=minute}"

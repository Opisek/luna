      info: "Falls aktiv, kann jede*r ein Konto erstellen.\nFalls Sie nur ein Paar Leute einladen möchten, gehen Sie in die \"Benutzer\" Kategorie."
    geolocation:
      display: "Standort von IP-Adressen ermitteln"
      info: "Falls aktiv, wird der ungefähre Standort von Benutzersessionen in den Einstellungen des jeweiligen Nutzers ermittelt. Dank dieser Funktion können Benutzer leichter feststellen, ob ein Angreifer Zugang zu ihrem Konte erlangen hat. Da die Standortermittlung ein Service eines Dritten verwendet, ist diese Funktionalität mit Privatheitsbedenken verbunden. Falls Sie diese Gefahr nicht eingehen möchten, können Sie diese Funktionalität hier deaktivieren. Es sei angemerkt, dass die IP Adressen selbst dennoch in der Datenbank zwecks Sicherheit gespeichert werden, allerdings außerhalb der hiermit gesteuerten Funktoanalität an keine Dritten weitergegeben werden."
    pfp:
      gravatar:
        display: "Gravatar-Profilbilder aktivieren"
        info: "Gravatar ist ein Service von Dritten, mit dem Benutzer Ihre Profilbilder nur einmalig für Ihre E-Mail Adresse setzen müssen. Dies geschieht durch eine Anfrage an Gravatar-Server mit einem MD5-Hashwert der E-Mail Adresse. Dies kann als eine Gefahr für die Privatsphäre angesehen werden, da Gravat somit die Nutzer über verschiedene Seiten hinweg tracken könnte. Falls Sie diese Gefahr nicht engehen möchten, können Sie hier Gravatar-Profibilder für alle Nutzer deaktivieren."
      cache:
        display: "Profilbilder cachen"
        info: "Falls aktiv, werden Profilbbilder von anderen Websites (inklusive Gravatar) auf dem Server lokal abgespeichert. Dies erhöht die Performanz und Privatheit, kann aber dazu führen, dass auf Ihrem Server illegale Bilder gehostet werden, falls ein böswilliger Nutzer ein solches Profilbild einstellt. Dieselbe Gefahr besteht, wenn Nutzer Ihre Profilbilder direkt hochladen können."
      upload:
        display: "Hochladen von eigenen Profilbildern"
        info: "Falls aktiv, können Benutzer ihre eigene Profilbilder hochladenr. Es besteht die Gefahr, dass auf ihrem Server illegale Bilder gehostet werden, falls ein böswilliger Nutzer ein solches Bild hochlädt. Dieselbe Gefahr besteht, wenn Profilbilder von anderen Websites gecached werden."
    verbosity:
      display: "Detailliertheit von Fehlermeldungen"
      info: "Dies bestimmt wie detailliert die Fehlermeldungen sind.\nDiese Einstellungen ist für alle Nutzer gültig.\nDie \"Debug\" Stufe sollte nie außerhalb von Entwicklung verwendet werden."

        .input {$date}
        .input {$hours :integer}
        .input {$minutes :integer}
      
        .match $hours $minutes
          0 1 {{Läuft um {$date :time precision=minute} ab (noch {$minutes} Minute übrig)}}
          0 * {{Läuft um {$date :time precision=minute} ab (noch {$minutes} Minuten übrig)}}
          1 * {{Läuft um {$date :time precision=minute} ab (noch {$hours} Stunde übrig)}}

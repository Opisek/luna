calendar:
  display: "Calendar"
  id: "Calendar ID"
  title:
    view: "Calendar"
    create: "Create calendar"
    edit: "Edit calendar"
  confirm:
    delete: "Are you sure you want to delete calendar {$name}?"
  error:
    create: "Could not create calendar {$name}: {$msg}"
    edit: "Could not edit calendar {$name}: {$msg}"
    delete: "Could not delete calendar {$name}: {$msg}"
    move: "Could not move calendar {$name}: {$msg}"
    reset: "Could not reset calendar {$name}: {$msg}"
    events:
      tooltip: "An error occurred trying to retrieve events from this calendar."
  events:
    count:
      all: |
        .input {$count :integer}
        .match $count
          0 {{Keine Ereignisse}}
          one {{{$count} Ereignis}}
          * {{{$count} Ereignisse}}
      more: |
        .input {$count :integer}
        .match $count
          1 {{und {$count} Weiteres}}
          * {{und {$count} Weitere}}

